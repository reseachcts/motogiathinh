name: Build iOS unsigned IPA (sideload) [added to main by Claude]

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sideload:
    name: iOS (unsigned device IPA)
    runs-on: macos-14
    timeout-minutes: 40
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4
        with:
          repository: DacPhu/motogiathinh
          ref: improve

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Build web bundle (build.mjs → www/)
        run: npm run build

      - name: Add + sync iOS + patch Info.plist
        run: |
          npx cap add ios
          npx cap sync ios
          node patch-native.mjs

      - name: Generate app icons
        run: npx capacitor-assets generate --ios

      - name: pod install
        working-directory: mobile/ios/App
        run: pod install

      - name: Build unsigned (device, no code signing)
        working-directory: mobile/ios/App
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .app into an unsigned .ipa
        working-directory: mobile/ios/App
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          apps=(build/Build/Products/Release-iphoneos/*.app)
          if [ ${#apps[@]} -eq 0 ]; then echo "::error::build produced no .app"; exit 1; fi
          rm -rf Payload "$RUNNER_TEMP/MotoGiaThinhCTV-unsigned.ipa"
          mkdir Payload
          cp -R "${apps[0]}" Payload/
          zip -qry "$RUNNER_TEMP/MotoGiaThinhCTV-unsigned.ipa" Payload
          ls -la "$RUNNER_TEMP"/*.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: motogiathinh-ctv-ios-unsigned-ipa
          path: ${{ runner.temp }}/MotoGiaThinhCTV-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
