name: Build Android APK (real device)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android (debug APK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4
        with:
          repository: DacPhu/motogiathinh
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install deps
        run: npm install

      - name: Build web bundle (build.mjs → www/)
        run: npm run build

      - name: Add + sync Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Generate app icons
        run: npx capacitor-assets generate --android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: motogiathinh-ctv-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
