server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — lets us defer the backend hostname lookup to
    # request time, so nginx still starts if the backend container is down.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        client_max_body_size 20m;
        # Return JSON instead of an HTML 502 page so the data-loader's
        # error toast renders something readable when the backend is offline.
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_down;
    }

    location @backend_down {
        default_type application/json;
        return 503 '{"error":"backend_unavailable","detail":"backend service is not reachable"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /fonts/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Source files (HTML/JS/JSX/CSS) — no caching during dev so volume-mounted
    # edits show up on browser refresh. Babel re-compiles JSX in-browser anyway.
    location ~* \.(html|js|jsx|css)$ {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }
}
